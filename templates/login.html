<!DOCTYPE html>

<html>

<head>

<title>Nova Login</title>

<link rel="stylesheet" href="/static/style.css">

</head>


<body class="auth-page">



<div class="auth-card">


<h1>
🌸 Nova
</h1>


<h2>
Welcome Back ✨
</h2>


<p>
Login to continue shopping
</p>



<form method="POST">

{% csrf_token %}


<input 
type="username"
name="username"
placeholder="Username"
required>



<input 
type="password"
name="password"
placeholder="Password"
required>



<button class="auth-btn">

Login

</button>



</form>



<p>

New to Nova?

<a href="/register/">

Create Account

</a>

</p>


</div>


</body>

</html>
