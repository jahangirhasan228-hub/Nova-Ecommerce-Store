<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — Kroy Shindhu</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="navbar">
    <a href="/" class="logo"><img src="/static/logo.svg" alt="Kroy Shindhu"></a>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/cart/">Cart 🛒</a>
        <a href="/orders/">Orders</a>
        {% if user.is_authenticated %}<a href="/logout/">Logout</a>{% endif %}
    </div>
</div>

<div class="checkout-page">
    <div class="checkout-card">
        <h1>Shipping Information</h1>
        <p>Complete your details for delivery</p>
        <form method="POST">
            {% csrf_token %}
            <div class="form-grid">
                <div>
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="Enter your name" required>
                </div>
                <div>
                    <label>Phone Number</label>
                    <input type="text" name="phone" placeholder="01XXXXXXXXX" required>
                </div>
                <div>
                    <label>City</label>
                    <input type="text" name="city" placeholder="Dhaka, Chittagong..." required>
                </div>
                <div>
                    <label>Postal Code</label>
                    <input type="text" name="pincode" placeholder="Postal code" required>
                </div>
            </div>
            <label>Full Address</label>
            <textarea name="address" placeholder="House/Road/Area — full delivery address" required></textarea>
            <button class="place-btn">Place Order</button>
        </form>
    </div>
</div>

<footer>
    <img src="/static/logo.svg" alt="Kroy Shindhu" style="height:34px;margin-bottom:10px;">
    <p style="font-size:12px;color:rgba(255,255,255,0.5);">© 2026 Kroy Shindhu | All Rights Reserved</p>
</footer>
<script src="/static/script.js"></script>
</body>
</html>
