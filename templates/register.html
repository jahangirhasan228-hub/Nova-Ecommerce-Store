<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Kroy Shindhu</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="navbar">
    <a href="/" class="logo"><img src="/static/logo.svg" alt="Kroy Shindhu"></a>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/cart/">Cart 🛒</a>
        <a href="/login/">Login</a>
    </div>
</div>

<div class="auth-container">
    <div class="auth-card">
        <img src="/static/logo.svg" alt="Kroy Shindhu" style="height:48px;margin-bottom:20px;">
        <h1>Create Account</h1>
        <p>Join Kroy Shindhu — Shop More, Live Better</p>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Choose a username" required>
            <input type="password" name="password" placeholder="Create a password" required>
            <button class="auth-btn">Register</button>
        </form>
        <p style="margin-top:20px;font-size:14px;">
            Already have an account? <a href="/login/">Login</a>
        </p>
    </div>
</div>

<footer>
    <img src="/static/logo.svg" alt="Kroy Shindhu" style="height:34px;margin-bottom:10px;">
    <p style="font-size:12px;color:rgba(255,255,255,0.5);">© 2026 Kroy Shindhu | All Rights Reserved</p>
</footer>
</body>
</html>
