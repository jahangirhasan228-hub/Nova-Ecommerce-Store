<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders — Kroy Shindhu</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="navbar">
    <a href="/" class="logo"><img src="/static/logo.svg" alt="Kroy Shindhu"></a>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/cart/">Cart 🛒</a>
        <a href="/logout/">Logout</a>
    </div>
</div>

<h1>My Orders</h1>
<div class="orders-container">
    {% for order in orders %}
    <div class="order-card">
        <img src="{{order.product.image.url}}" alt="{{order.product.name}}">
        <div>
            <h2>{{order.product.name}}</h2>
            <p>Price: ৳{{order.product.price}}</p>
            <p>Qty: {{order.quantity}}</p>
            <p>Date: {{order.ordered_date|date:"d M Y"}}</p>
            <span class="status">Processing</span>
        </div>
    </div>
    {% empty %}
    <div style="text-align:center;padding:80px 0;">
        <h2 style="color:#666;">No orders yet</h2>
        <a href="/" class="btn" style="display:inline-block;margin-top:16px;">Start Shopping</a>
    </div>
    {% endfor %}
</div>

<footer>
    <img src="/static/logo.svg" alt="Kroy Shindhu" style="height:34px;margin-bottom:10px;">
    <p style="font-size:12px;color:rgba(255,255,255,0.5);">© 2026 Kroy Shindhu | All Rights Reserved</p>
</footer>
</body>
</html>
