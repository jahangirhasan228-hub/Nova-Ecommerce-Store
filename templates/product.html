<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{product.name}} — Kroy Shindhu</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="navbar">
    <a href="/" class="logo"><img src="/static/logo.svg" alt="Kroy Shindhu"></a>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/cart/">Cart 🛒</a>
        {% if user.is_authenticated %}<a href="/logout/">Logout</a>{% else %}<a href="/login/">Login</a>{% endif %}
    </div>
</div>

<div class="product-detail">
    <div class="card" style="width:100%;max-width:420px;margin:40px auto;">
        <img src="{{product.image.url}}" alt="{{product.name}}">
        <h1 style="font-size:22px;margin:16px 0 8px;">{{product.name}}</h1>
        <p style="font-size:22px;font-weight:700;color:#0F52BA;">৳{{product.price}}</p>
        <p style="color:#666;font-size:14px;line-height:1.6;margin-bottom:20px;">{{product.description}}</p>
        <a class="btn" href="/add/{{product.id}}" onclick="cartMessage()" style="display:block;text-align:center;">
            Add to Cart 🛒
        </a>
    </div>
</div>

<footer>
    <img src="/static/logo.svg" alt="Kroy Shindhu" style="height:34px;margin-bottom:10px;">
    <p style="font-size:12px;color:rgba(255,255,255,0.5);">© 2026 Kroy Shindhu | All Rights Reserved</p>
</footer>
<script src="/static/script.js"></script>
</body>
</html>
